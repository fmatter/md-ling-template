filters:
  - pandoc-crossref
  - citeproc
  # - filters/pandoc-ling.lua

# Default metadata values that can be overridden by documents
metadata:
  # Set the default language for the document
  lang: en-US
  # Bibliography and citation style
  citeproc: true
  bibliography: sources.bib
  reference-section-title: "Bibliography"
  link-citations: true
  linkReferences: true # For pandoc-crossref to link references
  # This is a dummy default, will be overridden by `crossrefYaml` in documents
  crossrefYaml: crossref-en-US.yaml

# Output file settings
to: html
template: templates/default.html
css:
  - style.css
number-sections: true
# toc: true
# toc-depth: 2