filters:
  - pandoc/filters/pandoc-ling.lua  # Linguistic examples (creates .gl spans)
  - pandoc/filters/linguistic-markup.lua  # Semantic markup: converts .gl → \gl{} in LaTeX (must run AFTER pandoc-ling)
  - pandoc/filters/glossing-list.lua  # Auto-discover and link glossing abbreviations
  - pandoc-crossref  # MUST come before citeproc
  - citeproc  # Citations - runs after pandoc-crossref
  - pandoc/filters/subtables.lua  # Subtable support (MUST run after citeproc to handle citations in captions)
  - pandoc/filters/simple-tables.lua  # Render all tables with auto-width columns and captions above
  - pandoc/filters/docx-styles.lua  # Ensure custom styles work in DOCX output

# Custom template (for LaTeX output with affiliation support)
template: pandoc/templates/default.latex

# PDF engine (use LuaLaTeX for Unicode support)
pdf-engine: lualatex

# Pandoc-crossref configuration (English by default)
# For German, use: --metadata-file=pandoc/crossref-de-DE.yaml
metadata-files:
  - pandoc/crossref-en-US.yaml

# Default metadata values that can be overridden by documents
metadata:
  link-citations: true
  linkReferences: true # For pandoc-crossref to link references
  codeBlockCaptions: true
  colorlinks: true
  urlcolor: BrickRed
  linkcolor: black
  citecolor: black
  toccolor: black

# CSS for HTML output
css: pandoc/style.css

# Output file settings
standalone: true
number-sections: true
