name: Build PDF

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0, v2.1.3, etc.
      - 'r*' # Also support r1, r2, etc. for revisions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases and upload assets
    container:
      image: pandoc/latex:latest
      # This image includes: pandoc, texlive-full
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for content files
        id: check-content
        run: |
          if [ -f project.yaml ] || [ -f content.md ]; then
            echo "has-content=true" >> $GITHUB_OUTPUT
            echo "✓ Found content files - will build PDF"
          else
            echo "has-content=false" >> $GITHUB_OUTPUT
            echo "⚠ No content.md or project.yaml found - skipping build"
            echo "This is likely a template repository release, not an article build"
          fi
      
      - name: Install system dependencies
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          apk add --no-cache python3 py3-pip wget tar xz bash fontconfig ttf-linux-libertine ttf-dejavu
          
          # Install Noto fonts
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSerif/full/ttf/NotoSerif-Regular.ttf
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSerif/full/ttf/NotoSerif-Bold.ttf
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSerif/full/ttf/NotoSerif-Italic.ttf
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSerif/full/ttf/NotoSerif-BoldItalic.ttf
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSans/full/ttf/NotoSans-Regular.ttf
          wget https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSans/full/ttf/NotoSans-Bold.ttf
          mkdir -p /usr/share/fonts/truetype/noto
          mv Noto*.ttf /usr/share/fonts/truetype/noto/
          fc-cache -fv
      
      - name: Install LaTeX packages
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          # Skip tlmgr update due to checksum errors on mirrors
          # Install packages with retry logic
          PACKAGES="koma-script titling etoolbox caption booktabs linguex gb4e chngcntr hyperxmp"
          
          for pkg in $PACKAGES; do
            echo "Installing $pkg..."
            for i in 1 2 3; do
              if tlmgr install $pkg 2>&1; then
                echo "✓ Installed $pkg"
                break
              else
                echo "Retry $i/3 for $pkg"
                sleep 2
              fi
            done
          done
      
      - name: Install pandoc-crossref
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          # Check pandoc version and install matching pandoc-crossref
          PANDOC_VERSION=$(pandoc --version | head -1 | cut -d' ' -f2)
          echo "Pandoc version: $PANDOC_VERSION"
          
          # Map pandoc versions to pandoc-crossref versions
          # See: https://github.com/lierdakil/pandoc-crossref/releases
          case "$PANDOC_VERSION" in
            3.5*)
              CROSSREF_VERSION="v0.3.18.0"
              ;;
            3.4*)
              CROSSREF_VERSION="v0.3.18.0" 
              ;;
            3.3*)
              CROSSREF_VERSION="v0.3.17.1"
              ;;
            *)
              CROSSREF_VERSION="v0.3.18.0"  # Latest
              ;;
          esac
          
          echo "Installing pandoc-crossref $CROSSREF_VERSION for pandoc $PANDOC_VERSION"
          wget https://github.com/lierdakil/pandoc-crossref/releases/download/${CROSSREF_VERSION}/pandoc-crossref-Linux.tar.xz
          tar -xf pandoc-crossref-Linux.tar.xz
          mv pandoc-crossref /usr/local/bin/
          chmod +x /usr/local/bin/pandoc-crossref
          echo "Verifying versions:"
          pandoc-crossref --version
      
      - name: Verify tools
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          pandoc --version
          lualatex --version | head -1
      
      - name: Build PDF (auto-detect mode)
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          if [ -f project.yaml ]; then
            echo "Building multi-file project from project.yaml"
            python3 pandoc/build.py --project -o output.pdf
          else
            echo "Building single-file project from content.md"
            python3 pandoc/build.py content.md -o output.pdf
          fi
      
      - name: Upload PDF artifact
        if: steps.check-content.outputs.has-content == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: paper-${{ github.ref_name }}
          path: output.pdf
          retention-days: 90
      
      - name: Create Release
        if: steps.check-content.outputs.has-content == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: output.pdf
          body: |
            PDF build for ${{ github.ref_name }}
            
            Auto-generated from tagged commit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
