name: Build PDF

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0, v2.1.3, etc.
      - 'r*' # Also support r1, r2, etc. for revisions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases and upload assets
    container:
      image: pandoc/latex:latest
      # This image includes: pandoc, texlive-full
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for content files
        id: check-content
        run: |
          if [ -f project.yaml ] || [ -f content.md ]; then
            echo "has-content=true" >> $GITHUB_OUTPUT
            echo "✓ Found content files - will build PDF"
          else
            echo "has-content=false" >> $GITHUB_OUTPUT
            echo "⚠ No content.md or project.yaml found - skipping build"
            echo "This is likely a template repository release, not an article build"
          fi
      
      - name: Install system dependencies
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          apk add --no-cache python3 py3-pip wget tar xz bash fontconfig ttf-linux-libertine
      
      - name: Install LaTeX packages
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          # Skip tlmgr update due to checksum errors on mirrors
          # Install packages with retry logic
          PACKAGES="koma-script titling etoolbox caption booktabs linguex gb4e chngcntr hyperxmp"
          
          for pkg in $PACKAGES; do
            echo "Installing $pkg..."
            for i in 1 2 3; do
              if tlmgr install $pkg 2>&1; then
                echo "✓ Installed $pkg"
                break
              else
                echo "Retry $i/3 for $pkg"
                sleep 2
              fi
            done
          done
      
      - name: Install pandoc-crossref
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          # Use v0.3.18.0 for Pandoc 3.9+
          CROSSREF_VERSION="v0.3.18.0"
          echo "Installing pandoc-crossref $CROSSREF_VERSION"
          wget https://github.com/lierdakil/pandoc-crossref/releases/download/${CROSSREF_VERSION}/pandoc-crossref-Linux.tar.xz
          tar -xf pandoc-crossref-Linux.tar.xz
          mv pandoc-crossref /usr/local/bin/
          chmod +x /usr/local/bin/pandoc-crossref
          pandoc-crossref --version
      
      - name: Verify tools
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          pandoc --version
          lualatex --version | head -1
      
      - name: Build PDF (auto-detect mode)
        if: steps.check-content.outputs.has-content == 'true'
        run: |
          if [ -f project.yaml ]; then
            echo "Building multi-file project from project.yaml"
            python3 pandoc/build.py --project -o output.pdf
          else
            echo "Building single-file project from content.md"
            python3 pandoc/build.py content.md -o output.pdf
          fi
      
      - name: Upload PDF artifact
        if: steps.check-content.outputs.has-content == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: paper-${{ github.ref_name }}
          path: output.pdf
          retention-days: 90
      
      - name: Create Release
        if: steps.check-content.outputs.has-content == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: output.pdf
          body: |
            PDF build for ${{ github.ref_name }}
            
            Auto-generated from tagged commit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
